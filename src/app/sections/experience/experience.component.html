<section id="experience" class="exp">
    <div class="inner">
        <app-section-header num="03" label="Experience" title="Where I've worked." />

        <div class="list">
            @for (job of jobs; track job.company; let i = $index) {
                <app-experience-row [job]="job" [open]="openIndex() === i" (toggle)="toggle(i)" />
            }
        </div>
    </div>
</section>
