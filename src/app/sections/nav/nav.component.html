<nav class="nav" [class.nav--scrolled]="scrolled()">
    <div class="inner">
        <!-- logo mark -->
        <button class="brand" (click)="scrollTo('top')" aria-label="Back to top">
            <span class="mark">
                <span class="chip"></span>
            </span>
            <span class="name mono">greg<span class="marut">.marut</span></span>
        </button>

        <!-- links -->
        <ul class="links" role="list">
            @for (link of links; track link.id) {
                <li>
                    <button
                        class="item"
                        [class.item--active]="activeSection() === link.id"
                        (click)="scrollTo(link.id)"
                    >
                        <span class="num mono">{{ link.num }}</span>
                        {{ link.label }}
                    </button>
                </li>
            }
        </ul>

        <!-- available pill -->
        <div class="pill">
            <span class="status-dot"></span>
            Available
        </div>
    </div>
</nav>
