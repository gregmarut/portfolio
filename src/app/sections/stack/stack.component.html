<section id="stack" class="stack">
    <div class="inner">
        <app-section-header
            num="04"
            label="Stack"
            sub="Tools I reach for first. Languages and frameworks come and go — the patterns stick."
        >
            The <em class="serif">toolbox</em>.
        </app-section-header>

        <div class="grid">
            @for (group of groups; track group.group) {
                <div class="group">
                    <h3 class="title mono">{{ group.group }}</h3>
                    <ul class="items">
                        @for (item of group.items; track item) {
                            <li class="item">{{ item }}</li>
                        }
                    </ul>
                </div>
            }
        </div>
    </div>
</section>
