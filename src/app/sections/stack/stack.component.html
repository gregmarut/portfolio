<section id="stack" class="stack">
    <div class="inner">
        <app-section-header
            num="04"
            label="Stack"
            title="Tools I work with."
            sub="The technologies I reach for when building production systems."
        />

        <div class="grid">
            @for (group of groups; track group.group) {
                <div class="group">
                    <h3 class="title mono">{{ group.group }}</h3>
                    <ul class="items">
                        @for (item of group.items; track item) {
                            <li class="item">{{ item }}</li>
                        }
                    </ul>
                </div>
            }
        </div>
    </div>
</section>
