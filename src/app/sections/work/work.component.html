<section id="work" class="work">
    <div class="inner">
        <app-section-header num="02" label="Work" sub="A handful of projects that started as side experiments and got out of hand.">
            Things I've <em class="serif">built</em>.
        </app-section-header>

        <div class="toolbar">
            <span class="count mono">{{ projects.length }} projects</span>
            <div class="toggle" role="group" aria-label="Layout toggle">
                <button
                    class="tog"
                    [class.tog--active]="layout() === 'cards'"
                    (click)="layout.set('cards')"
                    aria-label="Grid view"
                >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="8" height="8" rx="1"/>
                        <rect x="13" y="3" width="8" height="8" rx="1"/>
                        <rect x="3" y="13" width="8" height="8" rx="1"/>
                        <rect x="13" y="13" width="8" height="8" rx="1"/>
                    </svg>
                    Cards
                </button>
                <button
                    class="tog"
                    [class.tog--active]="layout() === 'list'"
                    (click)="layout.set('list')"
                    aria-label="List view"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                    List
                </button>
            </div>
        </div>

        <div class="grid" [class.grid--list]="layout() === 'list'">
            @for (project of projects; track project.name) {
                <app-project-card [project]="project" [layout]="layout()"/>
            }
        </div>
    </div>
</section>
